<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#142845" />
      <stop offset="100%" stop-color="#070d17" />
    </linearGradient>

    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fc3f7" />   <stop offset="50%" stop-color="#4dd0a0" />  <stop offset="100%" stop-color="#ffb347" /> </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0" />
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <circle cx="256" cy="256" r="180" fill="url(#centerGlow)" />

  <path d="M 143 369 A 160 160 0 1 1 369 369" 
        fill="none" 
        stroke="rgba(255,255,255,0.05)" 
        stroke-width="36" 
        stroke-linecap="round" />

  <g filter="url(#shadow)">
    
    <path d="M 143 369 A 160 160 0 1 1 369 369" 
          fill="none" 
          stroke="url(#arcGrad)" 
          stroke-width="36" 
          stroke-linecap="round" />

    <rect x="182" y="240" width="36" height="80" rx="18" fill="#4fc3f7" />
    
    <rect x="238" y="150" width="36" height="170" rx="18" fill="#4dd0a0" />
    
    <rect x="294" y="200" width="36" height="120" rx="18" fill="#ffb347" />

    <circle cx="256" cy="385" r="10" fill="#4dd0a0" />
    
  </g>
</svg>
