name: Keep Supabase Active

on:
  schedule:
    # Co ~4 dni o różnych godzinach - bezpieczny margines przed limitem 7 dni Supabase
    - cron: '23 9  1,3,5,9,13,17,18,19,21,25,26,29 * *'   # co 4 dni, 9:23
    - cron: '51 14 2,3,7,11,15,19,20,23,27    * *'   # co 4 dni, 14:51
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest reading
        run: |
          # Losowe opóźnienie 0-5 minut
          sleep $((RANDOM % 300))

          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/odczyty?select=miesiac,rok,stan&order=dzien.desc&limit=1" \
            | grep -o '"miesiac":"[^"]*"' \
            && echo "✓ Baza aktywna"
