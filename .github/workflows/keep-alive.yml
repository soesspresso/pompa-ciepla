name: Keep Supabase Active
on:
  schedule:
    # Pseudo-losowy harmonogram symulujący ruch człowieka
    # Skrypt odpali się w różne dni miesiąca o różnych godzinach (odstępy 3-5 dni)
    - cron: '14 7 2,9,18,26 * *'   # Rano (07:14) w wybrane dni
    - cron: '47 7 2,9,18,26 * *'   # Rano (07:14) w wybrane dni
    - cron: '12 16 5,14,22,29 * *' # Po południu (16:42) w inne dni
    - cron: '42 16 5,14,22,29 * *' # Po południu (16:42) w inne dni
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest reading
        run: |
          # Dodatkowy jitter: opóźnia wykonanie losowo od 0 do 5 minut.
          # Dzięki temu zapytanie nigdy nie leci dokładnie w tej samej sekundzie.
          sleep $((RANDOM % 120))
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/odczyty?select=miesiac,rok,stan&order=dzien.desc&limit=1" \
            | grep -o '"miesiac":"[^"]*"' \
            && echo "✓ Baza aktywna"
