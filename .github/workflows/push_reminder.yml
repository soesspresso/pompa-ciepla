name: Monthly Push Reminder
on:
  schedule:
    - cron: '0 10 1 * *'  # 1. dzień każdego miesiąca o 10:00
  workflow_dispatch:      # Pozwala odpalić ręcznie do testu

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install web-push @supabase/supabase-js
      - name: Run send script
        run: node send-push.js
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
